# Deploy from monorepo root: fly deploy --config services/api/fly.toml
app = "supermart-checkout-api"
primary_region = "bom"

[build]
  dockerfile = "services/api/Dockerfile"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
